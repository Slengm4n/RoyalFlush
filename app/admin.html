<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyalFlush - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="/css/admin.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
    <link rel="manifest" href="../img/site.webmanifest">
</head>

<body class="p-4 md:p-8 pb-20">

    <!-- TELA DE LOGIN BÁSICA -->
    <div id="loginOverlay" class="fixed inset-0 z-[999] bg-black flex flex-col items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/p6.png')] p-4">
        <div class="bg-black/80 p-8 md:p-10 rounded-3xl border border-gold/30 shadow-[0_0_50px_rgba(212,175,55,0.2)] text-center max-w-md w-full backdrop-blur-md">
            <i class="fas fa-shield-alt text-5xl text-gold mb-4"></i>
            <h2 class="text-3xl casino-title text-gold mb-2">Acesso Restrito</h2>
            <p class="text-gray-400 text-sm mb-8">Insira a senha da organização para aceder ao Painel.</p>
            
            <form onsubmit="window.checkPassword(event)" class="flex flex-col gap-4">
                <input type="password" id="adminPassword" class="bg-black/60 border-2 border-gold/40 rounded-xl p-4 text-center text-white font-mono tracking-widest focus:outline-none focus:border-gold transition" placeholder="SENHA">
                <button type="submit" class="bg-gradient-to-b from-[#d4af37] to-[#aa8a2e] text-black font-black py-4 rounded-xl uppercase tracking-widest hover:brightness-110 active:scale-95 transition shadow-lg">
                    Desbloquear
                </button>
            </form>

            <!-- Links Rápidos de Navegação -->
            <div class="mt-8 pt-6 border-t border-white/10 flex justify-center gap-6">
                <a href="../index.html" class="text-xs text-gray-500 hover:text-gold uppercase tracking-widest transition flex items-center p-2"><i class="fas fa-mobile-alt mr-2 text-lg"></i> App</a>
                <a href="telao.html" class="text-xs text-gray-500 hover:text-gold uppercase tracking-widest transition flex items-center p-2"><i class="fas fa-desktop mr-2 text-lg"></i> Telão</a>
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO FLUTUANTE -->
    <div class="fixed bottom-4 right-4 z-[90] flex flex-col gap-3 opacity-20 hover:opacity-100 focus-within:opacity-100 transition-opacity duration-300">
        <a href="../index.html" class="bg-black/90 border border-gold/50 text-gold w-12 h-12 flex items-center justify-center rounded-full active:bg-gold active:text-black transition shadow-lg" title="Ir para a App dos Convidados">
            <i class="fas fa-mobile-screen text-xl"></i>
        </a>
        <a href="telao.html" class="bg-black/90 border border-gold/50 text-gold w-12 h-12 flex items-center justify-center rounded-full active:bg-gold active:text-black transition shadow-lg" title="Ir para o Telão">
            <i class="fas fa-desktop text-xl"></i>
        </a>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-8 border-b border-gray-700 pb-4 gap-4 mt-2">
        <div class="text-center md:text-left">
            <img src="/img/sagui_joker.png" alt="Logo Fatec Ferraz" class="w-14 h-14 mx-auto mb-4 drop-shadow-[0_0_30px_rgba(212,175,55,0.3)]">
            <h1 class="text-3xl md:text-4xl casino-title mb-1">Central de Comando</h1>
            <p class="text-[10px] md:text-xs tracking-widest text-gray-400 uppercase font-bold">Monitoramento & Bar</p>
        </div>

        <div class="bg-black/50 px-6 py-4 rounded-xl border border-gold/30 text-center w-full md:w-auto shadow-inner">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Jogadores na Mesa</p>
            <p id="totalPlayers" class="text-4xl font-black text-gold leading-none">0</p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">

        <!-- COLUNA 1: VALIDADOR DE VOUCHER (BAR) -->
        <div class="glass-panel p-5 md:p-6 rounded-2xl lg:col-span-2">
            <h2 class="text-lg md:text-xl font-bold text-gold mb-4 uppercase tracking-widest border-b border-gold/20 pb-2">
                <i class="fas fa-qrcode mr-2"></i> Validador de Shot (Bar)
            </h2>

            <form onsubmit="window.validateVoucher(event)" class="mb-5">
                <label class="block text-[10px] md:text-xs text-gray-400 uppercase font-bold mb-3">Clique aqui e leia o QR Code ou digite o ID:</label>
                <!-- Alterado para flex-col no mobile para não espremer o botão -->
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="voucherInput" placeholder="ROYAL-ABCD-1234" autofocus autocorrect="off" autocapitalize="characters"
                        class="w-full bg-black/60 border-2 border-gold/40 rounded-xl p-4 text-white text-center sm:text-left font-mono uppercase focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold transition shadow-inner">
                    <button type="submit"
                        class="w-full sm:w-auto bg-gradient-to-b from-[#d4af37] to-[#aa8a2e] text-black px-8 py-4 rounded-xl font-black uppercase hover:brightness-110 active:scale-95 transition shadow-lg text-sm md:text-base tracking-widest">
                        Validar
                    </button>
                </div>
            </form>

            <!-- Resultado da Validação -->
            <div id="voucherStatus"
                class="min-h-[90px] flex items-center justify-center rounded-xl bg-black/40 border border-white/5 p-4 text-center sm:text-left">
                <p class="text-gray-500 text-xs md:text-sm font-bold tracking-widest uppercase">Aguardando código...</p>
            </div>
        </div>

        <!-- COLUNA 2: CONTROLE DO CORINGA -->
        <div class="glass-panel p-5 md:p-6 rounded-2xl flex flex-col justify-between">
            <div>
                <h2 class="text-lg md:text-xl font-bold text-purple-400 mb-4 uppercase tracking-widest border-b border-purple-900/50 pb-2">
                    <i class="fas fa-mask mr-2"></i> Controle do Coringa
                </h2>
                <p class="text-[10px] md:text-xs text-gray-400 uppercase font-bold mb-1">Coringa Atual:</p>
                <p id="jokerName" class="text-xl md:text-2xl font-black text-white mb-6 truncate bg-black/30 p-3 rounded-lg border border-white/5 text-center sm:text-left">Nenhum</p>
            </div>

            <div class="space-y-3">
                <button onclick="window.randomizeJoker()"
                    class="w-full bg-purple-700 hover:bg-purple-600 active:scale-95 text-white py-4 rounded-xl font-black uppercase text-[10px] md:text-xs tracking-widest transition shadow-[0_0_15px_rgba(168,85,247,0.4)] flex justify-center items-center">
                    <i class="fas fa-random mr-2 text-lg"></i> Sortear P/ Outro
                </button>
                <button onclick="window.resetJoker()"
                    class="w-full bg-black/50 border border-red-500/50 hover:bg-red-900/40 active:scale-95 text-red-400 py-4 rounded-xl font-bold uppercase text-[10px] md:text-xs tracking-widest transition flex justify-center items-center">
                    <i class="fas fa-undo-alt mr-2 text-lg"></i> Devolver pro Baralho
                </button>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MESA (DASHBOARD DE CARTAS) -->
    <div class="glass-panel p-5 md:p-6 rounded-2xl">
        <h2 class="text-lg md:text-xl font-bold text-gold mb-6 uppercase tracking-widest border-b border-gold/20 pb-2 flex justify-between items-center">
            <span><i class="fas fa-layer-group mr-2"></i> A Mesa</span>
            <span class="text-[9px] text-gray-500 bg-black/50 px-2 py-1 rounded">AO VIVO</span>
        </h2>

        <!-- Grid de Cartas -->
        <div id="cardsGrid"
            class="flex flex-wrap gap-4 md:gap-6 justify-center md:justify-start max-h-[500px] overflow-y-auto p-4 bg-black/20 rounded-xl border border-black/50 shadow-inner">
            <p class="text-gray-500 w-full text-center py-10 text-sm">Carregando cartas da mesa...</p>
        </div>
    </div>
<script type="module" src="/js/app.js"></script>
</body>
</html>
