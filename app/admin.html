<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Match Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --gold: #d4af37;
            --wine-dark: #2a0505;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #000000 100%);
            min-height: 100vh;
        }

        /* Previne o zoom automático no iPhone ao clicar num campo de texto */
        input[type="text"], input[type="password"] {
            font-size: 16px !important;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .casino-title {
            font-family: 'UnifrakturMaguntia', cursive;
            color: var(--gold);
        }

        /* Mini Cartas para a Mesa */
        .mini-card {
            width: 70px;
            height: 100px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--gold);
            background: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .mini-card::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.1;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            border-radius: 6px;
        }

        .mini-card.joker {
            background: linear-gradient(135deg, #1a1a1a, #3b0764);
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        /* Scrollbar customizada para a mesa */
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }
    </style>
</head>

<body class="p-4 md:p-8 pb-20">

    <!-- TELA DE LOGIN BÁSICA -->
    <div id="loginOverlay" class="fixed inset-0 z-[999] bg-black flex flex-col items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/p6.png')] p-4">
        <div class="bg-black/80 p-8 md:p-10 rounded-3xl border border-gold/30 shadow-[0_0_50px_rgba(212,175,55,0.2)] text-center max-w-md w-full backdrop-blur-md">
            <i class="fas fa-shield-alt text-5xl text-gold mb-4"></i>
            <h2 class="text-3xl casino-title text-gold mb-2">Acesso Restrito</h2>
            <p class="text-gray-400 text-sm mb-8">Insira a senha da organização para aceder ao Painel.</p>
            
            <form onsubmit="window.checkPassword(event)" class="flex flex-col gap-4">
                <input type="password" id="adminPassword" class="bg-black/60 border-2 border-gold/40 rounded-xl p-4 text-center text-white font-mono tracking-widest focus:outline-none focus:border-gold transition" placeholder="SENHA">
                <button type="submit" class="bg-gradient-to-b from-[#d4af37] to-[#aa8a2e] text-black font-black py-4 rounded-xl uppercase tracking-widest hover:brightness-110 active:scale-95 transition shadow-lg">
                    Desbloquear
                </button>
            </form>

            <!-- Links Rápidos de Navegação -->
            <div class="mt-8 pt-6 border-t border-white/10 flex justify-center gap-6">
                <a href="index.html" class="text-xs text-gray-500 hover:text-gold uppercase tracking-widest transition flex items-center p-2"><i class="fas fa-mobile-alt mr-2 text-lg"></i> App</a>
                <a href="telao.html" class="text-xs text-gray-500 hover:text-gold uppercase tracking-widest transition flex items-center p-2"><i class="fas fa-desktop mr-2 text-lg"></i> Telão</a>
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO FLUTUANTE -->
    <div class="fixed bottom-4 right-4 z-[90] flex flex-col gap-3 opacity-20 hover:opacity-100 focus-within:opacity-100 transition-opacity duration-300">
        <a href="index.html" class="bg-black/90 border border-gold/50 text-gold w-12 h-12 flex items-center justify-center rounded-full active:bg-gold active:text-black transition shadow-lg" title="Ir para a App dos Convidados">
            <i class="fas fa-mobile-screen text-xl"></i>
        </a>
        <a href="telao.html" class="bg-black/90 border border-gold/50 text-gold w-12 h-12 flex items-center justify-center rounded-full active:bg-gold active:text-black transition shadow-lg" title="Ir para o Telão">
            <i class="fas fa-desktop text-xl"></i>
        </a>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-8 border-b border-gray-700 pb-4 gap-4 mt-2">
        <div class="text-center md:text-left">
            <h1 class="text-3xl md:text-4xl casino-title mb-1">Central de Comando</h1>
            <p class="text-[10px] md:text-xs tracking-widest text-gray-400 uppercase font-bold">Monitoramento & Bar</p>
        </div>

        <div class="bg-black/50 px-6 py-4 rounded-xl border border-gold/30 text-center w-full md:w-auto shadow-inner">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Jogadores na Mesa</p>
            <p id="totalPlayers" class="text-4xl font-black text-gold leading-none">0</p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">

        <!-- COLUNA 1: VALIDADOR DE VOUCHER (BAR) -->
        <div class="glass-panel p-5 md:p-6 rounded-2xl lg:col-span-2">
            <h2 class="text-lg md:text-xl font-bold text-gold mb-4 uppercase tracking-widest border-b border-gold/20 pb-2">
                <i class="fas fa-qrcode mr-2"></i> Validador de Shot (Bar)
            </h2>

            <form onsubmit="window.validateVoucher(event)" class="mb-5">
                <label class="block text-[10px] md:text-xs text-gray-400 uppercase font-bold mb-3">Clique aqui e leia o QR Code ou digite o ID:</label>
                <!-- Alterado para flex-col no mobile para não espremer o botão -->
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="voucherInput" placeholder="ROYAL-ABCD-1234" autofocus autocorrect="off" autocapitalize="characters"
                        class="w-full bg-black/60 border-2 border-gold/40 rounded-xl p-4 text-white text-center sm:text-left font-mono uppercase focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold transition shadow-inner">
                    <button type="submit"
                        class="w-full sm:w-auto bg-gradient-to-b from-[#d4af37] to-[#aa8a2e] text-black px-8 py-4 rounded-xl font-black uppercase hover:brightness-110 active:scale-95 transition shadow-lg text-sm md:text-base tracking-widest">
                        Validar
                    </button>
                </div>
            </form>

            <!-- Resultado da Validação -->
            <div id="voucherStatus"
                class="min-h-[90px] flex items-center justify-center rounded-xl bg-black/40 border border-white/5 p-4 text-center sm:text-left">
                <p class="text-gray-500 text-xs md:text-sm font-bold tracking-widest uppercase">Aguardando código...</p>
            </div>
        </div>

        <!-- COLUNA 2: CONTROLE DO CORINGA -->
        <div class="glass-panel p-5 md:p-6 rounded-2xl flex flex-col justify-between">
            <div>
                <h2 class="text-lg md:text-xl font-bold text-purple-400 mb-4 uppercase tracking-widest border-b border-purple-900/50 pb-2">
                    <i class="fas fa-mask mr-2"></i> Controle do Coringa
                </h2>
                <p class="text-[10px] md:text-xs text-gray-400 uppercase font-bold mb-1">Coringa Atual:</p>
                <p id="jokerName" class="text-xl md:text-2xl font-black text-white mb-6 truncate bg-black/30 p-3 rounded-lg border border-white/5 text-center sm:text-left">Nenhum</p>
            </div>

            <div class="space-y-3">
                <button onclick="window.randomizeJoker()"
                    class="w-full bg-purple-700 hover:bg-purple-600 active:scale-95 text-white py-4 rounded-xl font-black uppercase text-[10px] md:text-xs tracking-widest transition shadow-[0_0_15px_rgba(168,85,247,0.4)] flex justify-center items-center">
                    <i class="fas fa-random mr-2 text-lg"></i> Sortear P/ Outro
                </button>
                <button onclick="window.resetJoker()"
                    class="w-full bg-black/50 border border-red-500/50 hover:bg-red-900/40 active:scale-95 text-red-400 py-4 rounded-xl font-bold uppercase text-[10px] md:text-xs tracking-widest transition flex justify-center items-center">
                    <i class="fas fa-undo-alt mr-2 text-lg"></i> Devolver pro Baralho
                </button>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MESA (DASHBOARD DE CARTAS) -->
    <div class="glass-panel p-5 md:p-6 rounded-2xl">
        <h2 class="text-lg md:text-xl font-bold text-gold mb-6 uppercase tracking-widest border-b border-gold/20 pb-2 flex justify-between items-center">
            <span><i class="fas fa-layer-group mr-2"></i> A Mesa</span>
            <span class="text-[9px] text-gray-500 bg-black/50 px-2 py-1 rounded">AO VIVO</span>
        </h2>

        <!-- Grid de Cartas -->
        <div id="cardsGrid"
            class="flex flex-wrap gap-4 md:gap-6 justify-center md:justify-start max-h-[500px] overflow-y-auto p-4 bg-black/20 rounded-xl border border-black/50 shadow-inner">
            <p class="text-gray-500 w-full text-center py-10 text-sm">Carregando cartas da mesa...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // LÓGICA DE LOGIN BÁSICA
        window.checkPassword = (e) => {
            e.preventDefault();
            const pwd = document.getElementById('adminPassword').value;
            
            if (pwd === "royal2026") {
                sessionStorage.setItem('admin_auth_party', 'true');
                document.getElementById('loginOverlay').style.display = 'none';
                if(!currentUser) loginFirebase();
            } else {
                alert("Senha incorreta! (Dica: royal2026)");
                document.getElementById('adminPassword').value = '';
            }
        };

        if (sessionStorage.getItem('admin_auth_party') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
        }

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyC8Do2gBZFllqUvVScL24lh99g_T-3qX94",
            authDomain: "royalflush-a2542.firebaseapp.com",
            projectId: "royalflush-a2542",
            storageBucket: "royalflush-a2542.firebasestorage.app",
            messagingSenderId: "928142170599",
            appId: "1:928142170599:web:d5568ae550a892dc544542",
            measurementId: "G-Y6FLL9VGJK"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'festa-royal-flush';

        let currentUser = null;

        const participantsCol = collection(db, 'artifacts', appId, 'public', 'data', 'participants');
        const jokerRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'joker_status');
        const vouchersCol = collection(db, 'artifacts', appId, 'public', 'data', 'vouchers');

        // --- VALIDADOR DO BAR ---
        window.validateVoucher = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const input = document.getElementById('voucherInput');
            const statusDiv = document.getElementById('voucherStatus');
            const code = input.value.trim().toUpperCase();

            if (!code) return;

            try {
                const vRef = doc(vouchersCol, code);
                const vSnap = await getDoc(vRef);

                if (vSnap.exists()) {
                    const time = new Date(vSnap.data().usedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    statusDiv.innerHTML = `
                        <div class="w-full bg-red-950/90 text-red-200 p-4 md:p-5 rounded-xl border-2 border-red-500 flex flex-col sm:flex-row items-center sm:items-start shadow-[0_0_20px_rgba(239,68,68,0.3)] gap-3 text-center sm:text-left">
                            <i class="fas fa-times-circle text-4xl sm:text-5xl text-red-500"></i>
                            <div>
                                <h3 class="font-black text-xl md:text-2xl tracking-widest">JÁ UTILIZADO!</h3>
                                <p class="text-xs md:text-sm mt-1">Este código foi resgatado às <strong>${time}</strong>. Não sirva o shot.</p>
                            </div>
                        </div>`;
                } else {
                    if (code.startsWith('ROYAL-') || code.startsWith('MATCH-')) {
                        await setDoc(vRef, { usedAt: new Date().toISOString(), code: code });
                        statusDiv.innerHTML = `
                            <div class="w-full bg-green-950/90 text-green-200 p-4 md:p-5 rounded-xl border-2 border-green-500 flex flex-col sm:flex-row items-center sm:items-start shadow-[0_0_20px_rgba(34,197,94,0.3)] gap-3 text-center sm:text-left animate-pulse">
                                <i class="fas fa-check-circle text-4xl sm:text-5xl text-green-500"></i>
                                <div>
                                    <h3 class="font-black text-xl md:text-2xl tracking-widest">VÁLIDO! 🥂</h3>
                                    <p class="text-xs md:text-sm mt-1">Código registrado. Pode servir o Shot Duplo!</p>
                                </div>
                            </div>`;
                    } else {
                        statusDiv.innerHTML = `
                            <div class="w-full bg-yellow-950/90 text-yellow-200 p-4 md:p-5 rounded-xl border-2 border-yellow-500 flex flex-col sm:flex-row items-center sm:items-start gap-3 text-center sm:text-left">
                                <i class="fas fa-exclamation-triangle text-4xl sm:text-5xl text-yellow-500"></i>
                                <div>
                                    <h3 class="font-black text-lg md:text-xl tracking-widest">CÓDIGO INVÁLIDO</h3>
                                    <p class="text-xs md:text-sm mt-1">Formato incorreto. Tente ler o QR Code novamente.</p>
                                </div>
                            </div>`;
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Erro de conexão. Verifique a internet.");
            }
            input.value = '';
            input.focus();
        };

        // --- CONTROLO DO CORINGA ---
        window.randomizeJoker = async () => {
            if (!currentUser) return;
            if (!confirm("Tornar o Coringa atual numa carta normal e jogar o Coringa para ALGUÉM ALEATÓRIO da festa?")) return;

            try {
                const snap = await getDocs(participantsCol);
                const candidates = [];
                let currentJokerDoc = null;

                snap.forEach(d => {
                    if (d.data().is_joker) {
                        currentJokerDoc = d;
                    } else {
                        candidates.push(d);
                    }
                });

                if (candidates.length === 0) return alert("A mesa precisa de pelo menos mais uma pessoa para transferir o Coringa!");

                if (currentJokerDoc) {
                    const oldJokerRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', currentJokerDoc.id);
                    await updateDoc(oldJokerRef, {
                        is_joker: false,
                        suitName: 'Trevos',
                        suitSymbol: '♣',
                        cardValue: '2',
                        color: '#1a1a1a',
                        suggestion: 'Encontre ALGUÉM com o naipe de Trevos!'
                    });
                }

                const randomDoc = candidates[Math.floor(Math.random() * candidates.length)];
                const data = randomDoc.data();
                const newJokerRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', randomDoc.id);

                await updateDoc(newJokerRef, {
                    is_joker: true,
                    suitName: 'Coringa',
                    suitSymbol: '🎭',
                    cardValue: 'J',
                    color: '#a855f7',
                    suggestion: "Você é o Caos! Encontre quem você quiser para o seu Match Perfeito."
                });

                await setDoc(jokerRef, { taken: true, winner: data.uid, name: data.name });
                alert(`🎲 Feito! O novo Coringa agora é: ${data.name.toUpperCase()}!`);

            } catch (err) { 
                console.error(err); 
                alert("Erro ao tentar transferir o Coringa."); 
            }
        };

        window.resetJoker = async () => {
            if (!currentUser) return;
            if (!confirm("Tem certeza? Isso vai tirar o Coringa de quem tem agora e deixá-lo no baralho (5% de chance) para os PRÓXIMOS a entrarem.")) return;

            try {
                const snap = await getDocs(participantsCol);
                let currentJokerDoc = null;

                snap.forEach(d => {
                    if (d.data().is_joker) currentJokerDoc = d;
                });

                if (currentJokerDoc) {
                    const oldJokerRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', currentJokerDoc.id);
                    await updateDoc(oldJokerRef, {
                        is_joker: false,
                        suitName: 'Trevos',
                        suitSymbol: '♣',
                        cardValue: '2',
                        color: '#1a1a1a',
                        suggestion: 'Encontre ALGUÉM com o naipe de Trevos!'
                    });
                }

                await deleteDoc(jokerRef);
                alert("Coringa revogado e devolvido ao baralho!");
            } catch (err) {
                console.error(err);
                alert("Erro ao revogar Coringa.");
            }
        };

        // --- SISTEMA DE INICIALIZAÇÃO ---
        async function loginFirebase() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                startMonitoring();
            }
        });

        function startMonitoring() {
            if (!currentUser) return;

            onSnapshot(participantsCol, (snapshot) => {
                const grid = document.getElementById('cardsGrid');
                const total = document.getElementById('totalPlayers');
                const jokerName = document.getElementById('jokerName');

                grid.innerHTML = '';
                total.innerText = snapshot.size;

                let hasJoker = false;

                snapshot.forEach(doc => {
                    const d = doc.data();

                    if (d.is_joker) {
                        hasJoker = true;
                        jokerName.innerText = d.name;
                    }

                    const isJokerCard = d.is_joker;
                    const cardClass = isJokerCard ? 'joker text-purple-300' : 'text-black';
                    const textColor = isJokerCard ? '#d8b4fe' : d.color;
                    const valDisplay = isJokerCard ? 'J' : d.cardValue;
                    const symDisplay = isJokerCard ? '🤡' : d.suitSymbol;
                    
                    const instaRaw = d.instagram || '';
                    const instaClean = instaRaw.replace('@', '');
                    const instaHTML = instaClean 
                        ? `<a href="https://instagram.com/${instaClean}" target="_blank" class="text-[10px] text-pink-400 hover:text-pink-300 mt-1 truncate w-full text-center" title="Ver Instagram"><i class="fab fa-instagram"></i> @${instaClean}</a>` 
                        : `<span class="text-[9px] text-gray-600 mt-1">Sem Insta</span>`;

                    const cardHTML = `
                        <div class="flex flex-col items-center group w-[75px] md:w-[80px]">
                            <div class="mini-card ${cardClass} hover:-translate-y-2 transition-transform duration-300" style="color: ${textColor}">
                                <span class="text-3xl font-black leading-none drop-shadow-sm">${valDisplay}</span>
                                <span class="text-2xl mt-1 opacity-90">${symDisplay}</span>
                            </div>
                            <span class="text-[11px] text-white mt-3 font-bold max-w-full text-center truncate bg-black/50 px-2 py-1 rounded w-full" title="${d.name}">${d.name.split(' ')[0]}</span>
                            ${instaHTML}
                            <span class="text-[9px] text-gold font-mono tracking-widest mt-1">${d.matchCode}</span>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                });

                if (!hasJoker) {
                    jokerName.innerText = "Ninguém tirou ainda";
                }

                if (snapshot.empty) {
                    grid.innerHTML = '<p class="text-gray-500 w-full text-center py-10 text-sm">A mesa está vazia no momento.</p>';
                }
            });
        }

        window.onload = () => {
            if (sessionStorage.getItem('admin_auth_party') === 'true') {
                loginFirebase();
            }
        };
    </script>
</body>
</html>
